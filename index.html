<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Runner</title>

<style>

body{
    margin:0;
    background:#1e1e2f;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* Góc phải */

#topBar{
    position:absolute;
    top:15px;
    right:20px;
    display:flex;
    gap:30px;
    align-items:center;
    font-size:32px;
    font-weight:bold;
    z-index:1000;
}

#lives{
    color:#ff4d4d;
}

#timer{
    color:#ffd700;
}

/* Câu hỏi */

#questionBox{
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:80%;
}

#question{
    font-size:60px;
    font-weight:bold;
    line-height:1.4;
}

/* Đáp án */

.answer{
    position:absolute;
    top:100px;
    padding:15px 35px;
    background:#4CAF50;
    border-radius:12px;
    font-size:30px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    transition:0.2s;
}

.answer:hover{
    transform:scale(1.08);
}

/* Màn hình kết thúc */

#endScreen{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

#endTitle{
    font-size:90px;
    margin-bottom:20px;
}

button{
    padding:15px 35px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="topBar">
    <div id="lives">❤️❤️❤️</div>
    <div id="timer">04:00</div>
</div>

<div id="questionBox">
    <div id="question"></div>
</div>

<div id="endScreen">
    <h1 id="endTitle"></h1>
    <button onclick="location.reload()">
        Chơi lại
    </button>
</div>

<script>

/* ==========================
   DANH SÁCH CÂU HỎI
========================== */

const questions = [

{
    question:"2 + 2 bằng mấy?",
    answers:["1","2","3","4"],
    correct:"4"
},

{
    question:"Thủ đô Việt Nam là?",
    answers:["Huế","Đà Nẵng","Hà Nội","Cần Thơ"],
    correct:"Hà Nội"
},

{
    question:"Mặt trời mọc ở hướng nào?",
    answers:["Tây","Đông","Nam","Bắc"],
    correct:"Đông"
}

];

/* ==========================
   BIẾN GAME
========================== */

let currentQuestion = 0;
let lives = 3;
let timeLeft = 240;

/* ==========================
   TIMER
========================== */

const timer = setInterval(()=>{

    timeLeft--;

    const minutes =
        Math.floor(timeLeft / 60);

    const seconds =
        timeLeft % 60;

    document.getElementById("timer").textContent =
        String(minutes).padStart(2,"0")
        + ":" +
        String(seconds).padStart(2,"0");

    if(timeLeft <= 0){

        clearInterval(timer);

        gameOver();

    }

},1000);

/* ==========================
   TIM
========================== */

function updateLives(){

    let hearts = "";

    for(let i=0;i<lives;i++){

        hearts += "❤️";

    }

    document.getElementById("lives")
    .textContent = hearts;

}

/* ==========================
   LOAD CÂU HỎI
========================== */

function loadQuestion(){

    document
    .querySelectorAll(".answer")
    .forEach(e=>e.remove());

    if(currentQuestion >= questions.length){

        youWin();

        return;
    }

    const q =
        questions[currentQuestion];

    document.getElementById("question")
    .textContent = q.question;

    q.answers.forEach((answerText,index)=>{

        const answer =
            document.createElement("div");

        answer.className = "answer";

        answer.textContent =
            answerText;

        answer.style.left =
            (window.innerWidth + index*350)
            + "px";

        document.body.appendChild(answer);

        /* SPEED */

        let speed = 6;

        const move = setInterval(()=>{

            let left =
                parseFloat(
                    answer.style.left
                );

            left -= speed;

            answer.style.left =
                left + "px";

            if(left < -250){

                answer.style.left =
                    window.innerWidth +
                    "px";

            }

        },16);

        answer.onclick = ()=>{

            clearInterval(move);

            /* ĐÚNG */

            if(answerText === q.correct){

                document.body.style.background =
                    "#1f5e2d";

                setTimeout(()=>{

                    document.body.style.background =
                    "#1e1e2f";

                },200);

            }

            /* SAI */

            else{

                lives--;

                updateLives();

                document.body.style.background =
                    "#7a1e1e";

                setTimeout(()=>{

                    document.body.style.background =
                    "#1e1e2f";

                },200);

                if(lives <= 0){

                    gameOver();

                    return;

                }

            }

            document
            .querySelectorAll(".answer")
            .forEach(e=>e.remove());

            currentQuestion++;

            setTimeout(
                loadQuestion,
                300
            );

        };

    });

}

/* ==========================
   GAME OVER
========================== */

function gameOver(){

    clearInterval(timer);

    document.getElementById(
        "questionBox"
    ).style.display = "none";

    document
    .querySelectorAll(".answer")
    .forEach(e=>e.remove());

    document.getElementById(
        "endScreen"
    ).style.display = "block";

    document.getElementById(
        "endTitle"
    ).innerHTML =
    "💀 GAME OVER";

}

/* ==========================
   YOU WIN
========================== */

function youWin(){

    clearInterval(timer);

    document.getElementById(
        "questionBox"
    ).style.display = "none";

    document
    .querySelectorAll(".answer")
    .forEach(e=>e.remove());

    document.getElementById(
        "endScreen"
    ).style.display = "block";

    document.getElementById(
        "endTitle"
    ).innerHTML =
    "🏆 YOU WIN";

}

/* ==========================
   KHỞI ĐỘNG
========================== */

loadQuestion();

</script>

</body>
</html>
