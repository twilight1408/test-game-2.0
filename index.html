<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>

<style>

body{
    margin:0;
    background:#1e1e2f;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    font-size:32px;
    font-weight:bold;
}

#lives{
    color:#ff4d4d;
}

#timer{
    color:#ffd700;
}

#questionBox{
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:80%;
}

#question{
    font-size:48px;
    font-weight:bold;
}

.answer{
    position:absolute;
    top:100px;
    padding:15px 35px;
    background:#4CAF50;
    border-radius:12px;
    font-size:36px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    transition:0.2s;
}

.answer:hover{
    transform:scale(1.1);
}

#endScreen{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

#endTitle{
    font-size:90px;
    margin-bottom:20px;
}

button{
    padding:15px 30px;
    font-size:24px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

</style>
</head>

<body>

<div id="topBar">
    <div id="lives">❤️❤️❤️</div>
    <div id="timer">04:00</div>
</div>

<div id="questionBox">
    <div id="question"></div>
</div>

<div id="endScreen">
    <h1 id="endTitle"></h1>
    <button onclick="location.reload()">Chơi lại</button>
</div>

<script>

const questions = [

{
    question:"2 + 2 bằng mấy?",
    answers:["1","2","3","4"],
    correct:"4"
},

{
    question:"Thủ đô Việt Nam là?",
    answers:["Huế","Đà Nẵng","Hà Nội","Cần Thơ"],
    correct:"Hà Nội"
},

{
    question:"Mặt trời mọc ở hướng nào?",
    answers:["Tây","Đông","Nam","Bắc"],
    correct:"Đông"
}

];

let currentQuestion = 0;
let lives = 3;

let timeLeft = 240;

const timer = setInterval(()=>{

    timeLeft--;

    let minutes = Math.floor(timeLeft/60);
    let seconds = timeLeft%60;

    document.getElementById("timer").textContent =
        String(minutes).padStart(2,"0")
        + ":"
        +
        String(seconds).padStart(2,"0");

    if(timeLeft <= 0){

        clearInterval(timer);

        gameOver();

    }

},1000);

function updateLives(){

    let hearts = "";

    for(let i=0;i<lives;i++){
        hearts += "❤️";
    }

    document.getElementById("lives").textContent = hearts;

}

function loadQuestion(){

    document.querySelectorAll(".answer").forEach(e=>e.remove());

    if(currentQuestion >= questions.length){

        youWin();

        return;
    }

    const q = questions[currentQuestion];

    document.getElementById("question").textContent =
        q.question;

    q.answers.forEach((answerText,index)=>{

        const answer =
            document.createElement("div");

        answer.className = "answer";

        answer.textContent = answerText;

        answer.style.left =
            (window.innerWidth + index*300) + "px";

        document.body.appendChild(answer);

        let speed = 8;

        const move = setInterval(()=>{

            let left =
                parseFloat(answer.style.left);

            left -= speed;

            answer.style.left = left + "px";

            if(left < -250){

                answer.style.left =
                    window.innerWidth + "px";

            }

        },16);

        answer.onclick = ()=>{

            clearInterval(move);

            if(answerText === q.correct){

                document.body.style.background =
                "#1f5e2d";

                setTimeout(()=>{
                    document.body.style.background =
                    "#1e1e2f";
                },200);

            }else{

                lives--;

                updateLives();

                document.body.style.background =
                "#7a1e1e";

                setTimeout(()=>{
                    document.body.style.background =
                    "#1e1e2f";
                },200);

                if(lives <= 0){

                    gameOver();

                    return;
                }

            }

            document
            .querySelectorAll(".answer")
            .forEach(e=>e.remove());

            currentQuestion++;

            setTimeout(loadQuestion,300);

        };

    });

}

function gameOver(){

    clearInterval(timer);

    document.getElementById("questionBox")
    .style.display = "none";

    document
    .querySelectorAll(".answer")
    .forEach(e=>e.remove());

    document.getElementById("endScreen")
    .style.display = "block";

    document.getElementById("endTitle")
    .innerHTML = "💀 GAME OVER";

}

function youWin(){

    clearInterval(timer);

    document.getElementById("questionBox")
    .style.display = "none";

    document
    .querySelectorAll(".answer")
    .forEach(e=>e.remove());

    document.getElementById("endScreen")
    .style.display = "block";

    document.getElementById("endTitle")
    .innerHTML = "🏆 YOU WIN";

}

loadQuestion();

</script>

</body>
</html>
